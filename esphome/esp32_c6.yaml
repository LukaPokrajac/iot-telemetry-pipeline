esphome:
  name: esp32_c6

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  hardware_uart: UART0

web_server:
  port: 80

mqtt:
  broker: "192.168.10.13"
  topic_prefix: "iot/prod/esp32_c6"

i2c:
  sda: GPIO19
  scl: GPIO20
  scan: true

one_wire:
  - platform: gpio
    pin: GPIO0

sensor:
  - platform: uptime
    name: "System_Uptime"
    update_interval: 10s

  - platform: adc
    pin: GPIO6
    name: "Soil_Moisture"
    unit_of_measurement: "%"
    attenuation: 12db
    update_interval: 30s
    filters:
      - calibrate_linear:
          - 3.0 -> 0.0   # adjust: voltage when dry
          - 1.5 -> 100.0 # adjust: voltage when saturated

  - platform: dallas_temp
    index: 0
    name: "Soil_Temperature"
    update_interval: 30s

  - platform: dallas_temp
    index: 1
    name: "Air_Temperature"
    update_interval: 30s

  - platform: aht10
    variant: AHT20
    temperature:
      name: "DHT20_Temperature"
    humidity:
      name: "DHT20_Humidity"
    update_interval: 30s

  - platform: bmp280_i2c
    address: 0x76
    temperature:
      name: "BMP280_Temperature"
    pressure:
      name: "BMP280_Pressure"
    update_interval: 30s

  - platform: bh1750
    address: 0x23
    name: "BH1750_Illuminance"
    update_interval: 30s

ota:
  - platform: esphome
