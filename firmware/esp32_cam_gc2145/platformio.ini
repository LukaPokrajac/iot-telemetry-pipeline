; ===========================================================================
; ESP32-CAM with RHYX M21-45 (GC2145) sensor.
; The GC2145 has NO hardware JPEG encoder, so ESPHome cannot drive it.
; This firmware inits the sensor in RGB565 and converts frames to JPEG in
; software (frame2jpg) to prove the camera works and serve a viewable image.
;
; Flash over USB (board must be in download mode: IO0->GND, then reset):
;   ~/.platformio/penv/bin/pio run -e esp32cam_gc2145 -t upload
; Then open the serial monitor to read the device IP, and browse:
;   http://<ip>/      -> single JPEG frame
; ===========================================================================
[env:esp32cam_gc2145]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
board_build.partitions = huge_app.csv
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1
