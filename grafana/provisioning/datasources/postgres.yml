apiVersion: 1

# Auto-provisions the PostgreSQL data source the pipeline writes to.
# Credentials come from the container environment (env_file: .env in docker-compose.yml).
# Reaches the postgres service over the compose network by its service name.
datasources:
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: ${PG_DB}
    user: ${PG_USER}
    isDefault: true
    secureJsonData:
      password: ${PG_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1400
